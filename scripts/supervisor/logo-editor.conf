[program:logo-editor]
command=/home/pi/nhlsb-venv/bin/python3 src/logo_editor.py --port 5000
directory=/home/pi/nhl-led-scoreboard
autostart=true
autorestart=true
stderr_logfile=/var/log/logo-editor.stderr.log
stderr_logfile_maxbytes=1MB
